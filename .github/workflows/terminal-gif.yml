name: Generate Terminal GIF

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: mkdir -p assets
      - run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb
          # Install ttyd
          curl -fsSL https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64 -o ttyd
          chmod +x ttyd
          sudo mv ttyd /usr/local/bin/ttyd
          # Install vhs
          go install github.com/charmbracelet/vhs@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - run: xvfb-run vhs terminal.tape
      - run: mv terminal.gif assets/terminal.gif
      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Update terminal animation GIF
          branch: main
          commit_user_name: vhs-action
          commit_user_email: actions@github.com
          file_pattern: 'assets/terminal.gif'
