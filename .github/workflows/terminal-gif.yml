name: Generate Terminal GIF

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p assets
      - run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb
          curl -fsSL https://github.com/charmbracelet/vhs/releases/latest/download/vhs_linux_amd64 -o vhs
          chmod +x vhs
          sudo mv vhs /usr/local/bin/vhs
      - run: xvfb-run vhs terminal.tape
      - run: mv terminal.gif assets/terminal.gif
      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Update terminal animation GIF
          branch: main
          commit_user_name: vhs-action
          commit_user_email: actions@github.com
          file_pattern: 'assets/terminal.gif'
